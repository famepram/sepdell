<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Septa &amp; Dela</title>
  <meta name="description" content="Undangan pernikahan Septa dan Dela.">
  <style>
    @font-face {
      font-family: "Awesome Lathusca";
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src:
        url("assets/fonts/awesome-lathusca.woff2") format("woff2"),
        url("assets/fonts/awesome-lathusca.woff") format("woff");
    }
    @font-face {
      font-family: "Symphony";
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src:
        url("assets/fonts/symphony.woff2") format("woff2"),
        url("assets/fonts/symphony.woff") format("woff");
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f7f3ed 0%, #ece5db 100%);
      color: #111;
      font-family: Georgia, "Times New Roman", serif;
    }
    .cover {
      width: min(100vw, 400px);
      min-height: 100svh;
      background: #fff;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }
      .content-frame {
        position: relative;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 34px 20px 28px;
        margin: 0px 0;
      }
    .frame-border {
      position: absolute;
      inset: -18px;
      width: calc(100% + 36px);
      height: calc(100% + 36px);
      object-fit: fill;
      pointer-events: none;
    }
    .intro {
      margin: 28px 0 4px;
      font-size: 30px;
      letter-spacing: 0;
      text-transform: none;
      font-family: "Awesome Lathusca", Georgia, "Times New Roman", serif !important;
      font-weight: 400;
      line-height: 1;
      font-feature-settings: "liga" on, "clig" on, "calt" on;
    }
    .title {
      margin: 0;
      font-size: clamp(66px, 17vw, 102px);
      line-height: 0.9;
      font-weight: 500;
      font-family: "Symphony", "Brush Script MT", "Lucida Handwriting", cursive;
    }
      .hero-shell {
        position: relative;
        width: 280px;
        height: auto;
        margin: 8px 0 8px 0px;
        display: grid;
        place-items: center;
      }
    .hero {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .names {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      font-weight: 700;
      font-family: "Awesome Lathusca", Georgia, "Times New Roman", serif;
    }
    .date {
      margin: 10px 0 0;
      font-size: 17px;
      letter-spacing: 0.08em;
    }
    .countdown {
      margin: 18px 0 12px;
      width: 60%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }
    .count-value {
      font-size: 36px;
      line-height: 0.9;
      font-weight: 700;
      font-family: "Awesome Lathusca", Georgia, "Times New Roman", serif;
    }
    .count-label {
      font-size: 12px;
      letter-spacing: 0.08em;
      line-height: 0.9;
      text-transform: uppercase;
      color: #5b5b5b;
      font-family: "Awesome Lathusca", Georgia, "Times New Roman", serif;
    }
    .mail {
      width: 28px;
      height: 28px;
      margin: 2px 0 14px;
    }
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 120px;
        padding: 10px 22px;
        margin-bottom: 40px;
        border-radius: 999px;
        background: #000;
        color: #fff;
        text-decoration: none;
      font-size: 16px;
      border: 1px solid #000;
    }
    @media (max-width: 420px) {
      .cover {
        box-shadow: none;
        padding: 0;
      }
      .content-frame {
        padding: 34px 20px 28px;
      }
      .frame-border {
        inset: -14px;
        width: calc(100% + 28px);
        height: calc(100% + 28px);
      }
    }
  </style>
</head>
<body>
  <main class="cover">
    <div class="content-frame">
      <img class="frame-border" src="assets/images/hero-border.png" alt="" aria-hidden="true">
      <p class="intro">WELCOME TO</p>
      <h1 class="title">The Wedding</h1>
      <div class="hero-shell">
        <img class="hero" src="assets/images/image_cover.png" alt="Ilustrasi pengantin Septa dan Dela">
      </div>
      <p class="names">Septa &amp; Dela</p>
      <p class="date">Sabtu, 28 Maret 2026</p>

      <section class="countdown" aria-label="Hitung mundur menuju hari pernikahan">
        <div><div class="count-value" data-unit="days">00</div><div class="count-label">Hari</div></div>
        <div><div class="count-value" data-unit="hours">00</div><div class="count-label">Jam</div></div>
        <div><div class="count-value" data-unit="minutes">00</div><div class="count-label">Menit</div></div>
        <div><div class="count-value" data-unit="seconds">00</div><div class="count-label">Detik</div></div>
      </section>

      <svg class="mail" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M3 7.5 12 14l9-6.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="3.7" y="5.7" width="16.6" height="12.6" rx="1.8" stroke="currentColor" stroke-width="1.4"/>
      </svg>

      <a class="button" href="detail-event.html">Buka Undangan</a>
    </div>
  </main>

  <script>
    const targetDate = new Date("2026-03-28T00:00:00+07:00");
    const units = {
      days: document.querySelector('[data-unit="days"]'),
      hours: document.querySelector('[data-unit="hours"]'),
      minutes: document.querySelector('[data-unit="minutes"]'),
      seconds: document.querySelector('[data-unit="seconds"]')
    };

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function updateCountdown() {
      const now = new Date();
      const diff = Math.max(0, targetDate - now);
      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      units.days.textContent = pad(days);
      units.hours.textContent = pad(hours);
      units.minutes.textContent = pad(minutes);
      units.seconds.textContent = pad(seconds);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
