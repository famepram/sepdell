  <script>
// State
let allData = [];
const defaultConfig = {
  judul_utama: 'Reservasi',
  subjudul: 'Buku Tamu',
  deskripsi: 'Tinggalkan ucapan dan konfirmasi kehadiran Anda',
  tombol_kirim: 'Kirim Ucapan',
  background_color: 'transparent',
  surface_color: '#ffffff',
  text_color: '#1a1a1a',
  accent_color: '#3a3a3a',
  muted_color: '#555555',
  font_family: 'Playfair Display',
  font_size: 16
};

// Element SDK
window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => {
    const c = key => config[key] || defaultConfig[key];
    document.getElementById('el-judul').textContent = c('judul_utama');
    document.getElementById('el-subjudul').textContent = c('subjudul');
    document.getElementById('el-deskripsi').textContent = c('deskripsi');
    document.getElementById('btn-text').textContent = c('tombol_kirim');

    const tc = c('text_color');
    const ac = c('accent_color');
    const mc = c('muted_color');
    const sc = c('surface_color');
    const font = c('font_family');
    const baseSize = c('font_size');

    document.getElementById('el-judul').style.color = tc;
    document.getElementById('el-judul').style.fontFamily = `${font}, Playfair Display, serif`;
    document.getElementById('el-judul').style.fontSize = `${baseSize * 2.5}px`;
    document.getElementById('el-subjudul').style.color = ac;
    document.getElementById('el-subjudul').style.fontFamily = `${font}, Cormorant Garamond, serif`;
    document.getElementById('el-subjudul').style.fontSize = `${baseSize * 1.25}px`;
    document.getElementById('el-deskripsi').style.color = mc;
    document.getElementById('el-deskripsi').style.fontSize = `${baseSize * 0.875}px`;

    document.querySelectorAll('.manga-border').forEach(el => {
      if (el.id !== 'toast') el.style.background = `${sc}b3`;
    });

    document.querySelectorAll('#stat-hadir, #stat-tidak, #stat-total').forEach(el => {
      el.style.color = tc;
      el.style.fontFamily = `${font}, Playfair Display, serif`;
    });

    const btn = document.getElementById('btn-kirim');
    btn.style.background = tc;
    btn.style.fontFamily = `${font}, Cormorant Garamond, serif`;

    renderList();
  },
  mapToCapabilities: (config) => {
    const c = key => config[key] || defaultConfig[key];
    const mut = (key) => ({
      get: () => c(key),
      set: (v) => { config[key] = v; window.elementSdk.setConfig({ [key]: v }); }
    });
    return {
      recolorables: [mut('surface_color'), mut('text_color'), mut('accent_color'), mut('muted_color')],
      borderables: [],
      fontEditable: mut('font_family'),
      fontSizeable: mut('font_size')
    };
  },
  mapToEditPanelValues: (config) => new Map([
    ['judul_utama', config.judul_utama || defaultConfig.judul_utama],
    ['subjudul', config.subjudul || defaultConfig.subjudul],
    ['deskripsi', config.deskripsi || defaultConfig.deskripsi],
    ['tombol_kirim', config.tombol_kirim || defaultConfig.tombol_kirim]
  ])
});

// Toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden','toast-hide');
  t.classList.add('toast');
  setTimeout(() => { t.classList.add('toast-hide'); setTimeout(() => t.classList.add('hidden'), 300); }, 2500);
}

// Render
function renderList() {
  const container = document.getElementById('ucapan-list');
  const empty = document.getElementById('empty-msg');

  if (allData.length === 0) {
    empty.classList.remove('hidden');
    container.querySelectorAll('.ucapan-card').forEach(el => el.remove());
    return;
  }
  empty.classList.add('hidden');

  const sorted = [...allData].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  const existing = new Map([...container.querySelectorAll('.ucapan-card')].map(el => [el.dataset.id, el]));

  const tc = window.elementSdk.config?.text_color || defaultConfig.text_color;
  const mc = window.elementSdk.config?.muted_color || defaultConfig.muted_color;
  const sc = window.elementSdk.config?.surface_color || defaultConfig.surface_color;
  const font = window.elementSdk.config?.font_family || defaultConfig.font_family;

  sorted.forEach((item, i) => {
    const id = item.__backendId;
    let card = existing.get(id);
    if (card) {
      card.querySelector('.uc-nama').textContent = item.nama;
      card.querySelector('.uc-text').textContent = item.ucapan;
      card.querySelector('.uc-badge').textContent = item.kehadiran;
      existing.delete(id);
    } else {
      card = document.createElement('div');
      card.className = 'ucapan-card manga-border p-4';
      card.dataset.id = id;
      card.style.background = `${sc}99`;
      card.innerHTML = `
        <div class="flex justify-between items-start mb-2">
          <span class="uc-nama font-bold text-sm" style="font-family:'${font}',Playfair Display,serif;color:${tc}">${item.nama}</span>
          <span class="uc-badge text-xs px-2 py-0.5 uppercase tracking-wider" style="font-family:'Cormorant Garamond',serif;border:1px solid ${tc};color:${tc}">${item.kehadiran}</span>
        </div>
        <p class="uc-text text-sm italic leading-relaxed" style="font-family:'Cormorant Garamond',serif;color:${mc}">"${item.ucapan}"</p>
      `;
      card.style.animation = `fadeUp .4s ease ${i * .05}s both`;
      container.appendChild(card);
    }
  });

  existing.forEach(el => el.remove());

  // Reorder
  sorted.forEach(item => {
    const card = container.querySelector(`[data-id="${item.__backendId}"]`);
    if (card) container.appendChild(card);
  });
}

function updateStats() {
  const hadir = allData.filter(d => d.kehadiran === 'Hadir').length;
  const tidak = allData.filter(d => d.kehadiran === 'Tidak Hadir').length;
  document.getElementById('stat-hadir').textContent = hadir;
  document.getElementById('stat-tidak').textContent = tidak;
  document.getElementById('stat-total').textContent = allData.length;
}

// Data SDK
window.dataSdk.init({
  onDataChanged(data) {
    allData = data;
    updateStats();
    renderList();
  }
});

// Form
document.getElementById('guestForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (allData.length >= 999) { showToast('Batas maksimal 999 ucapan tercapai.'); return; }

  const nama = document.getElementById('inp-nama').value.trim();
  const ucapan = document.getElementById('inp-ucapan').value.trim();
  const kehadiran = document.querySelector('input[name="kehadiran"]:checked').value;
  if (!nama || !ucapan) return;

  const btn = document.getElementById('btn-kirim');
  const btnT = document.getElementById('btn-text');
  const btnL = document.getElementById('btn-loading');
  btn.disabled = true; btnT.classList.add('hidden'); btnL.classList.remove('hidden');

  const result = await window.dataSdk.create({ nama, ucapan, kehadiran, timestamp: new Date().toISOString() });

  btn.disabled = false; btnT.classList.remove('hidden'); btnL.classList.add('hidden');

  if (result.isOk) {
    showToast('Terima kasih atas ucapan Anda! ✦');
    e.target.reset();
  } else {
    showToast('Gagal mengirim. Coba lagi.');
  }
});

lucide.createIcons();
